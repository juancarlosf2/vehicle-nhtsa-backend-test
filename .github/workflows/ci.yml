name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build Docker image
        run: docker build --tag vehicle-data-service:ci .

      - name: Upload compiled application
        uses: actions/upload-artifact@v6
        with:
          name: vehicle-data-service
          path: |
            dist/
            drizzle/
          retention-days: 7
